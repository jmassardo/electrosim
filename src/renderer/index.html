<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:;">
  <title>ElectroSim - Arduino Simulator</title>
  
  <!-- Define global variables before any scripts load -->
  <script>
    // Define global object for Node.js compatibility
    if (typeof global === 'undefined') {
      var global = globalThis || window || this;
    }
    
    // Define process object for Node.js compatibility  
    if (typeof process === 'undefined') {
      var process = {
        env: { NODE_ENV: 'development' },
        browser: true,
        version: '',
        versions: { node: '0.0.0' },
        nextTick: function(fn) { setTimeout(fn, 0); },
        stdout: { write: function() {} },
        stderr: { write: function() {} }
      };
    }
    
    // Define Buffer if needed
    if (typeof Buffer === 'undefined') {
      var Buffer = { isBuffer: function() { return false; } };
    }
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow: hidden;
      background: #f5f5f5;
    }
    
    #root {
      width: 100vw;
      height: 100vh;
    }
    
    /* Loading animation */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
    }
    
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      color: white;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 500;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div style="text-align: center;">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading ElectroSim...</div>
      </div>
    </div>
  </div>
</body>
</html>
